# LAOS project contract
# Monitor de Ruptura — Lojas Giovanna (Docker + ShadowTraffic)

project: giovanna-rupture-monitor
type: deliverable
display_name: "Monitor de Ruptura por Região — Lojas Giovanna"
brief: >
  Pipeline ETL em 3 estágios com dados sintéticos (ShadowTraffic),
  calcula ruptura de estoque por região, gera relatório CSV e
  dashboard HTML. Dockerizado: único `docker run` produz dashboard funcional.

needs:
- etl
- data
- data-quality
- dashboard
- presentation

capabilities:
primary:
- latade
- ladesign
optional:
- context7

deliverables:
- path: main.py
  description: Pipeline ETL com 3 estágios (modo --local com ShadowTraffic)
- path: generate_shadowtraffic_data.py
  description: Gerador de dados sintéticos de inventário
- path: data/raw_data.json
  description: Dataset sintético usado pelo pipeline local
- path: data/rupture_report.csv
  description: Relatório de ruptura por região (gerado pelo pipeline)
- path: dashboard.html
  description: Dashboard HTML interativo com mapa de ruptura
- path: Dockerfile
  description: "Container Docker: roda pipeline + serve dashboard"
- path: docker-compose.yml
  description: "Compose para docker compose up"
- path: entrypoint.sh
  description: "Script de entrada: pipeline + http.server"
- path: README.md
  description: Documentação com instruções Docker e local
- path: data/quality_rules.md
  description: Regras de qualidade de dados
- path: spec/adr/001-rupture-pipeline.md
  description: Decisão técnica sobre stack e arquitetura

repo: https://github.com/laurentaf/giovanna-rupture-monitor
status: delivered
created_at: 2026-06-03

# Hard Rule #11 — synthetic data policy (retroactive, 2026-06-09)
# Project uses ShadowTraffic synthetic data by design.
data_policy:
  allow_synthetic: true
  scope:
    - "data/*"
    - "artifacts/data/*"
    - "artifacts/dq/*"
    - "dashboard.html"
  decided_at: "2026-06-09T00:00:00Z"
  decided_by: user_override
  reason: "ShadowTraffic synthetic inventory data is the project's core input — no real data source exists or is intended"
