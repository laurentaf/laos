# project.yaml — Meta-projeto: criação do subagente capability-architect
#
# Este meta-projeto adiciona um 6º subagente à topologia do LAOS:
# um "arquiteto" de capabilities, especializado em implementar mudanças
# estruturais APROVADAS pelo Conselho via LACOUNCIL.
#
# Diferente das capabilities de domínio (laecon, latade, etc.),
# capability-architect NÃO tem MCP server próprio nem capability repo.
# É um subagente do LAOS (mesmo nível de data-architect, dashboard-designer,
# automation-engineer, delivery-reviewer) com escopo meta-estrutural.
#
# Proposta LACOUNCIL: 2f42afe6-71d5-4ef8-a88a-1339d72ec501
# Estratégia: supermaioria (regra de registry)
# Resultado: APROVADA 2026-06-04 (4/4 SIM, 100%)
# 4 emendas do Conselho consolidadas em binding-conditions.md
#
# Status inicial: BASIC, com plano de evolução obrigatória de 30 dias
# para STABLE.

name: capability-architect
tipo: meta-projeto
brief: |
  Adicionar um subagente `capability-architect` à topologia do LAOS,
  com escopo estrito: implementar mudanças estruturais APROVADAS pelo
  Conselho via LACOUNCIL (novas capabilities, novas entradas de registry,
  novos workflows, novos knowledge entries, novos meta-projetos).
  NÃO propõe mudanças (papel do orchestrator+LACOUNCIL), NÃO faz trabalho
  de projeto (papel dos especialistas de domínio), NÃO vota no Conselho
  (separation of duties: Conselho delibera, capability-architect implementa).

needs:
  - improvement
  - governance
  - investigation

capabilities_used:
  - lacouncil
  - context7
  - exa
  - github

dominio_primario: improvement
# O meta-projeto é improvement (criar subagente novo), mas o
# capability-architect resultante atua sobre o eixo estrutural
# do LAOS (registry, knowledge, workflows, capability repos).

repo: self
# Meta-projeto, não tem child repo. O agent file vive em
# .opencode/agent/capability-architect.md; os meta-artifacts em
# projects/_meta/capability-architect/.

# Proposta LACOUNCIL
lacouncil_proposal: 2f42afe6-71d5-4ef8-a88a-1339d72ec501
lacouncil_estrategia: supermaioria
lacouncil_resultado: aprovada
lacouncil_data_aprovacao: 2026-06-04
lacouncil_votos: 4/4 SIM (data-architect, dashboard-designer, automation-engineer, delivery-reviewer)

# 4 emendas do Conselho (consolidadas em binding-conditions.md)
amendments_consolidadas:
  data_architect:
    - "DA-emenda: KB inicial de qualquer capability nova deve incluir seção 'Handoff Boundaries' (G2)."
  dashboard_designer:
    - "DD-emenda: domain-specialist (data/dashboard/automation/delivery) é revisor obrigatório do KB + contracts antes do delivery-reviewer (G3)."
  automation_engineer:
    - "AE-emenda: todo MCP server scaffolded deve expor health + list_supported_operations desde o dia 1 (G1)."
  delivery_reviewer:
    - "DR-emenda: BASIC sign-off (light) antes da capability ser exposta em needs-to-capabilities.yaml para routing; STABLE sign-off (full) para promoção (G4 + G8)."

# Restrições estruturais (Section A) e quality gates (Section B)
# Detalhes em projects/_meta/capability-architect/binding-conditions.md
# Field name kept as `condicoes_vinculantes` (canonical) so the preflight
# `check_yaml_arithmetic` (scripts/preflight_check.py:61-107) can sum
# restrictions_R1_R5 (5) + quality_gates_G1_G9 (9) == 14 == conditions_total.
# The full canonical source-of-truth list is in `binding-conditions.md`.
condicoes_vinculantes:
  restrictions_R1_R5:
    - R1: gate pós-aprovação obrigatória (lacouncil.get_proposal == 'aprovada')
    - R2: não escreve artefatos de projeto (SQL/dashboards/workflows/ML)
    - R3: não vota no Conselho
    - R4: não propõe mudanças
    - R5: não altera prompt de outro agente
  quality_gates_G1_G9:
    - G1: observability contract (health + list_supported_operations) em todo MCP server
    - G2: KB inicial com Handoff Boundaries
    - G3: domain-specialist review do KB + contracts
    - G4: BASIC sign-off antes de expor para routing
    - G5: registry + opencode.jsonc atualizados
    - G6: capability-evolution tracking file
    - G7: ADR documentando rationale
    - G8: status BASIC inicial, 30d para STABLE
    - G9: commit+push obrigatório pós-sign-off para mudanças estruturais (LACOUNCIL 391a8179)

deliverables:
  # === Agent file ===
  - path: .opencode/agent/capability-architect.md
    type: agent_definition
    description: Agent file com frontmatter (description, mode, permission), scope, MCP namespaces, output rules (G1-G9), anti-patterns, separation of duties (R1-R5). Segue formato dos outros subagents.
    validation: M0-1 (delivery-reviewer)
    status: pendente

  # === Meta-artifacts ===
  - path: projects/_meta/capability-architect/project.yaml
    type: meta_project_contract
    description: Este arquivo. Contrato do meta-projeto, paralelo a laecon-capability/project.yaml.
    validation: M0-2
    status: pendente

  - path: projects/_meta/capability-architect/binding-conditions.md
    type: binding_conditions
    description: 4 emendas do Conselho + 5 restrições estruturais + 9 quality gates consolidados em R1-R5 + G1-G9. Fonte de verdade para o agent.
    validation: M0-3 (formato + completeness)
    status: pendente

  - path: projects/_meta/capability-architect/capability-evolution.md
    type: tracking
    description: Tracking BASIC com milestones M0-M1, gates G1-G9 do meta-projeto, condições vinculantes R1-R5 + G1-G9 (resumo), risk register.
    validation: M0-4
    status: pendente

  - path: projects/_meta/adr/ADR-003-capability-architect-creation.md
    type: adr
    description: ADR documentando rationale (gap, 4 amendments, alternativas, consequências, separation of duties). Formato ADR-001.
    validation: M0-5 + delivery-reviewer (G7)
    status: pendente

  # === Mudanças estruturais em LAOS ===
  - path: AGENTS.md
    type: docs
    description: Topologia de agentes atualizada (5 → 6 agentes) com bullet do capability-architect.
    validation: M0-6
    status: pendente

  - path: .opencode/agent/orchestrator.md
    type: agent_definition
    description: Adicionar capability-architect como dispatch target pós-aprovação de proposta LACOUNCIL estrutural.
    validation: M0-7
    status: pendente

  # === LACOUNCIL memory ===
  - action: lacouncil.record_project
    type: registry
    description: >
      Chamada de record_project() registrando este meta-projeto em BASIC.
      Project_id retornado = 30c9521a-8a50-40f3-9b6f-eb9f01722af8.
      NOT a file path — this is an MCP action; M0-8 evidence lives in
      the LACOUNCIL DuckDB and the BC file.
    validation: M0-8
    status: entregue_2026-06-04

# SDD workflow (incorporado ao ADR; meta-projeto pequeno)
sdd_artifacts:
  brainstorm: projects/_meta/adr/ADR-003-capability-architect-creation.md
  define: projects/_meta/adr/ADR-003-capability-architect-creation.md
  plan: projects/_meta/capability-architect/capability-evolution.md
  tasks: projects/_meta/adr/ADR-003-capability-architect-creation.md

estado: M0_entregue
# M0 entregue 2026-06-04. 3 passes do delivery-reviewer, todos os 5 preflight
# checks passam, todos os 14 condições vinculantes (R1-R5 + G1-G9) intactas.
# M1 (BASIC→STABLE) agendado para 2026-07-04 (+30d), gated por:
# (a) ≥ 1 uso real do capability-architect em scaffolding de capability futura;
# (b) community feedback sobre R5 (única condição inferida);
# (c) delivery-reviewer STABLE sign-off.

criado_em: 2026-06-04

