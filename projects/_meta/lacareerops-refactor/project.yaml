# -----------------------------------------------------------------------
# Meta-project: lacareerops refactor (loop 1, submodule architecture)
# -----------------------------------------------------------------------
# This project tracks the structural refactor of lacareerops from a
# standalone fork (`laurentaf/career-ops`) to a git-submodule hub
# (`laurentaf/lacareerops-hub`) with the new `career_ops_sync` MCP tool.
# -----------------------------------------------------------------------

brief: |
  Refatorar a capability lacareerops substituindo o fork mirror
  (`laurentaf/career-ops`) por uma arquitetura de **submódulo git**
  centralizada no hub privado `laurentaf/lacareerops-hub`. Inclui:
  novo MCP tool `career_ops_sync` para avanço de pin com smoke battery
  (4 checks) + auto-rollback; preservação de SC-1/SC-2/SC-3 (privacy);
  mirror da ADR-013 em ambos os lados (LAOS + hub); e atualização de
  registry, knowledge base, capability-evolution tracking, meta-projeto
  e structural files em LAOS.

needs:
  - improvement                         # structural change → LACOUNCIL
  - career.sync                         # new tool `career_ops_sync`
  - career-tracker                      # preserved route via lacareerops
  - career-evaluation                   # preserved route via lacareerops

