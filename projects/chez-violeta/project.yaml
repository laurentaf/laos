# ─────────────────────────────────────────────────────────────
# Chez Violeta Operations Intelligence Platform
# ─────────────────────────────────────────────────────────────
project_name: chez-violeta
display_name: "Chez Violeta — Operations Intelligence Platform"
brief: >
  Plataforma de inteligência operacional para a Chez Violeta,
  loja de joias e acessórios. Unifica dados de vendas, estoque,
  compras, financeiro e RH em um único data warehouse analítico,
  com dashboards operacionais, modelo de precificação e previsão
  de estoque.

author:
  name: Laurent
  github: laurentaf

created_at: 2026-07-02
updated_at: 2026-07-02

# ─── Necessidades ──────────────────────────────────────────
needs:
  - data            # Modelagem dimensional (star schema)
  - dashboard       # Dashboards operacionais
  - econometrics    # Precificação e elasticidade
  - predictive-modeling  # Previsão de estoque
  - automation      # Pipelines automatizados
  - etl             # Ingestão bronze → silver → gold
  - data-quality    # Qualidade e dedup
  - design          # Design system visual

# ─── Capabilities usadas ───────────────────────────────────
capabilities_used:
  primary:
    - latade    # DuckDB, SQL, modelagem
    - ladesign  # Dashboards, design system
    - laecon    # Econometria, ML interpretável
    - lan8n     # Automação de pipelines
  platform:
    - context7  # Documentação
    - exa       # Pesquisa de mercado

# ─── Schema de dados (fonte) ───────────────────────────────
data_sources:
  - name: oracle_dmp
    description: "Oracle Export 10.01.00 do sistema GAVARNIE (2020-05-29)"
    storage: "PostgreSQL 16 em Docker (localhost:5433/chez_violeta)"
    tables: 100
    total_rows: 13618570
    pii_columns:
      - "CLIENTES.NOME_CLIENTE"
      - "CLIENTES.EMAIL"
      - "CLIENTES.CELULAR"
      - "CLIENTES.TELEFONE"
      - "ESTABELECIMENTOS.NUM_CNPJ"

# ─── Entregas ──────────────────────────────────────────────
deliverables:
  - name: data-model
    label: "Modelo Dimensional (Star Schema)"
    stage: 1
    artifacts:
      - "artifacts/data/schema-gold.sql"
      - "artifacts/data/dimensional-model.md"

  - name: dashboards
    label: "Dashboards Operacionais (wireframes)"
    stage: 2
    artifacts:
      - "artifacts/design/dashboard-vendas/wireframe.html"
      - "artifacts/design/dashboard-vendas/spec.md"
      - "artifacts/design/dashboard-estoque/wireframe.html"
      - "artifacts/design/dashboard-estoque/spec.md"

  - name: pricing-model
    label: "Modelo de Precificação (Elasticidade)"
    stage: 2
    artifacts:
      - "artifacts/data/pricing-model.md"

  - name: table-relationships
    label: "Validação de Integridade Referencial"
    stage: 2
    artifacts:
      - "artifacts/data/referential-integrity-report.md"
      - "artifacts/dq/fk-validation.sql"

  - name: goods-receipt-process
    label: "Documentação do Processo de Entrada de Mercadorias"
    stage: 2
    artifacts:
      - "artifacts/design/processo-entrada-mercadorias.md"

  - name: sales-generator
    label: "Gerador de Vendas Sintéticas (ARIMA + Sazonalidade)"
    stage: 3
    artifacts:
      - "artifacts/data/sales-generator.py"
      - "artifacts/data/sales-generator-spec.md"

  - name: simulation-engine
    label: "Motor de Simulação de Estoque"
    stage: 3
    artifacts:
      - "artifacts/simulation/simulation_engine.py"
      - "artifacts/simulation/simulation_config.json"
      - "artifacts/simulation/output/daily_log.csv"
      - "artifacts/simulation/output/stockouts.csv"
      - "artifacts/simulation/output/purchase_alerts.csv"
      - "artifacts/simulation/output/supplier_performance.csv"
      - "artifacts/simulation/output/slow_movers.csv"
      - "artifacts/simulation/output/summary.json"
      - "artifacts/simulation/dashboard/simulation_dashboard.html"

  - name: automation
    label: "Pipelines Automatizados (n8n)"
    stage: 3
    status: pending

  - name: deck
    label: "Apresentação Executiva"
    stage: 4
    status: pending

# ─── Política de dados ─────────────────────────────────────
data_policy:
  allow_synthetic: false
  pii_handling: "exclude from public artifacts; keep locally for model training"
  notes: "Dados reais extraídos do Oracle DMP via PostgreSQL local"

repo: "github.com/laurentaf/chez-violeta-intelligence"
status: active
