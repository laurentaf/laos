# ═══════════════════════════════════════════════════════════════════
#  COMPOSITION BLUEPRINT — NOT A TEMPLATE TO COPY
# ═══════════════════════════════════════════════════════════════════
# This file describes how the LAOS orchestrator composes existing
# capabilities (LATADE, LADESIGN, LAN8N) for a specific project
# archetype. Projects do NOT copy this file — the orchestrator reads
# it to dispatch subagents. Reuse happens by composing capabilities,
# not by duplicating files.
# ═══════════════════════════════════════════════════════════════════
#
# Workflow: apresentacao-executiva
#
# Executive narrative. Light data, heavy design and storytelling.

name: apresentacao-executiva
description: |
  Single-shot deliverable: an executive deck (and optional supporting
  one-pagers). Pulls minimal data, leans on LADESIGN heavily.

needs:
  - presentation
  - design

inputs:
  - topic
  - audience
  - data_inputs
  - target_format

stages:
  - id: sdd-scaffold
    stage_number: 0
    name: "Stage 0 — SDD Scaffold (Missão 0)"
    agent: orchestrator
    capabilities: [github]
    inputs: [project.yaml, brief, capabilities_used]
    output:
      - spec/constitution.md
      - spec/todo.md
      - spec/adr/_template.md
      - spec/adr/README.md
      - spec/harness/_template.md
      - spec/specs/000-bootstrap/spec.md
      - contract.md
      - README.md
      - spec/design-direction.md  # condicional: only if needs: contains dashboard|design
    description: |
      Missão 0 do projeto (proposta LACOUNCIL f9b636fc, unanimidade 4/4).
      Produz o esqueleto SDD ANTES de qualquer artefato técnico. 8
      arquivos fixos + 1 condicional, todos com conteúdo mínimo da
      matriz per-file em `knowledge/sdd-principles.md` §2. Templates
      canônicos vêm de `registry/spec-templates/` (cópia literal do
      LATADE). Gate mecânico no `subagent_boot_check.py` 6ª dimensão
      (sub-check `skeleton`).
    gate:
      mechanism: subagent_boot_check.py 6th-dimension sub-check `skeleton`
      blocks_transition: true
      action_on_fail: |
        Não avançar para discovery até todos os 9 arquivos atenderem
        tamanho mínimo + cabeçalhos obrigatórios. Mensagem do gate é
        acionável (aponta o arquivo e o gap específico).

  - id: brief
    agent: orchestrator
    capabilities: [exa, context7]
    inputs:
      - spec/todo.md
      - spec/specs/000-bootstrap/spec.md
    output: artifacts/brief.md
    description: |
      Sharpen the message. One sentence: what change in audience
      belief should this presentation cause?

  - id: outline
    agent: dashboard-designer
    capabilities: [ladesign]
    inputs: [artifacts/brief.md]
    output: artifacts/outline.md
    description: |
      Storyboard: section by section, what each slide must do.
      Use storytelling skills under LADESIGN (../ladesign/skills/).
      **Gatilho temporal do ADR-mínimo-1:** ao concluir este estágio
      (primeiro decisório para presentation), o projeto precisa de ≥ 1
      ADR real em `spec/adr/001-*.md` (ver `padroes-entrega.md` §Decisões).

  - id: data-pulls
    agent: data-architect
    capabilities: [latade]
    inputs: [artifacts/outline.md]
    output: artifacts/data/snapshots/
    description: |
      Only run if data_inputs is set. Produce frozen snapshots
      (not live queries) so the deck is reproducible.

  - id: deck
    agent: dashboard-designer
    capabilities: [ladesign]
    inputs:
      - artifacts/outline.md
      - artifacts/data/snapshots/
      - spec/design-direction.md  # condicional (criado em Stage 0)
    output: artifacts/deck/
    description: |
      Build via LADESIGN deck skill. Active DESIGN.md selected
      based on audience (executive -> conservative / brand-grade).

  - id: review
    agent: delivery-reviewer
    capabilities: []
    inputs: [all]
    output: artifacts/review/checklist.md
    note: |
      artifacts/review/checklist.md é OUTPUT do delivery-reviewer
      (NÃO entregável do projeto). Ownership:
      .opencode/agent/delivery-reviewer.md §"Sign-off checklist".

deliverables:
  # 9 fixos do SDD scaffold (Stage 0)
  - spec/constitution.md
  - spec/todo.md
  - spec/adr/_template.md
  - spec/adr/README.md
  - spec/harness/_template.md
  - spec/specs/000-bootstrap/spec.md
  - contract.md
  - README.md
  # Condicional: este workflow TEM `needs: presentation|design` → exigido
  - spec/design-direction.md
  # Artefatos de produção (stages 1+)
  - artifacts/deck/
  # Output do reviewer (não é entregável do projeto, mas referenciado)
  - artifacts/review/checklist.md
