# Needs → capabilities routing (DETERMINISTIC)
#
# Projects declare abstract `needs` in their project.yaml. The orchestrator
# resolves each need to one or more concrete capability IDs (defined in
# capabilities.yaml).
#
# Rules:
#   - The LLM does NOT invent capability selection. It walks this map.
#   - If a need is not in this map, fail loudly and ask the user to
#     either add a routing rule or rename the need.
#   - A need can map to multiple capabilities; the orchestrator picks
#     based on workflow stage or asks the user.

# ─── Game development needs ──────────────────────────────────

game-simulation:
  primary: [laengine]
  optional: [latade]

game-ui:
  primary: [ladesign, laengine]
  optional: [context7]

